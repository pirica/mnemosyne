name: mnemosyne
version: 1.0.0
description: Native AI memory system with SQLite - zero dependencies, sub-millisecond latency
author: Abdias J
provides_tools:
  - mnemosyne_remember
  - mnemosyne_recall
  - mnemosyne_stats
  - mnemosyne_triple_add
  - mnemosyne_triple_query
  - mnemosyne_sleep
  - mnemosyne_scratchpad_write
  - mnemosyne_scratchpad_read
  - mnemosyne_scratchpad_clear
provides_hooks:
  - pre_llm_call
  - on_session_start
  - post_tool_call
dependencies: []
# Mnemosyne requires no external dependencies - pure Python + SQLite
